name: MCP Layer CI

on:
  push:
    branches: [main, feat/mcp-integration]
    paths:
      - "mcp/**"
      - ".github/workflows/mcp-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "mcp/**"

env:
  PYTHON_VERSION: "3.11"
  BACKEND_URL: "http://test-backend.local"
  DATABASE_URL: "postgresql+asyncpg://test:test@localhost/testdb"
  STRIPE_SECRET_KEY: "sk_test_fake"
  MCP_SERVICE_TOKEN: "test-service-token-32-chars-minimum-length"

jobs:
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install mcp-core
        run: |
          # In production: uv pip install alloulq-mcp-core --index-url https://npm.pkg.github.com
          # For CI: install from local path (submodule or bundled)
          echo "mcp-core would be installed from GitHub Packages in production"

      - name: Install mcp dependencies
        working-directory: mcp
        run: uv sync --dev

      - name: ruff check
        working-directory: mcp
        run: uv run ruff check workspace_mcp/ billing_mcp/

      - name: ruff format check
        working-directory: mcp
        run: uv run ruff format --check workspace_mcp/ billing_mcp/

      - name: mypy
        working-directory: mcp
        run: uv run mypy --strict workspace_mcp/ billing_mcp/ --ignore-missing-imports

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        working-directory: mcp
        run: uv sync --dev

      - name: Run tests
        working-directory: mcp
        run: |
          uv run pytest tests/ \
            --cov=workspace_mcp \
            --cov=billing_mcp \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -v

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: success()
        with:
          flags: mcp-layer

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push workspace-mcp
        uses: docker/build-push-action@v5
        with:
          context: .
          file: mcp/Dockerfile.mcp
          target: workspace-mcp
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/workspace-mcp:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push billing-mcp
        uses: docker/build-push-action@v5
        with:
          context: .
          file: mcp/Dockerfile.mcp
          target: billing-mcp
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/billing-mcp:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to Staging (Hostinger VPS)
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: srv1431166.hstgr.cloud
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            # Pull latest images
            docker pull ghcr.io/${{ github.repository_owner }}/workspace-mcp:latest
            docker pull ghcr.io/${{ github.repository_owner }}/billing-mcp:latest

            # Restart with zero-downtime
            docker stop workspace-mcp || true
            docker rm workspace-mcp || true
            docker run -d \
              --name workspace-mcp \
              --restart unless-stopped \
              --env-file /root/mcp/.env \
              -p 8001:8001 \
              ghcr.io/${{ github.repository_owner }}/workspace-mcp:latest

            docker stop billing-mcp || true
            docker rm billing-mcp || true
            docker run -d \
              --name billing-mcp \
              --restart unless-stopped \
              --env-file /root/mcp/.env \
              -p 8002:8002 \
              ghcr.io/${{ github.repository_owner }}/billing-mcp:latest

            # Health check
            sleep 5
            curl -sf http://localhost:8001/health || (docker logs workspace-mcp; exit 1)
            curl -sf http://localhost:8002/health || (docker logs billing-mcp; exit 1)

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1
        with:
          host: srv1431166.hstgr.cloud
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            docker pull ghcr.io/${{ github.repository_owner }}/workspace-mcp:previous || true
            docker stop workspace-mcp || true
            docker run -d \
              --name workspace-mcp \
              --restart unless-stopped \
              --env-file /root/mcp/.env \
              -p 8001:8001 \
              ghcr.io/${{ github.repository_owner }}/workspace-mcp:previous
