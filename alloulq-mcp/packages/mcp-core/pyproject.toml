[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mcp-core"
version = "0.1.0"
description = "Shared core for ALLOUL&Q MCP servers"
requires-python = ">=3.11"
dependencies = [
    "python-jose[cryptography]>=3.3.0",
    "httpx>=0.27.0",
    "sqlalchemy>=2.0.0",
    "asyncpg>=0.29.0",
    "pydantic>=2.0.0",
    "pydantic-settings>=2.0.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/mcp_core"]
